spring:
  application:
    name: support-api
  r2dbc:
    url: ${R2DBC_URL:r2dbc:mysql://localhost:3306/exchange_db}
    username: ${R2DBC_USERNAME:root}
    password: ${R2DBC_PASSWORD:root}
  sql:
    init:
      mode: always
      platform: mysql

server:
  port: ${SERVER_PORT:8081}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

---
spring:
  config:
    activate:
      on-profile: h2
  r2dbc:
    url: r2dbc:h2:mem:///exchange_db;DB_CLOSE_DELAY=-1
    username: sa
    password:
  sql:
    init:
      mode: always
      platform: h2
