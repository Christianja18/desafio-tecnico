spring:
  application:
    name: experience-api

server:
  port: ${SERVER_PORT:8080}

clients:
  gorest:
    base-url: ${GOREST_BASE_URL:https://gorest.co.in}
  support:
    base-url: ${SUPPORT_BASE_URL:http://localhost:8081}

app:
  auth:
    username: ${APP_AUTH_USERNAME:challenge}
    password: ${APP_AUTH_PASSWORD}
  jwt:
    secret: ${APP_JWT_SECRET}
    expiration: ${APP_JWT_EXPIRATION:PT1H}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
